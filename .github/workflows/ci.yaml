name: Continuous integration
on:
  pull_request:
    branches: ["main"]

jobs:
  check-changes:
    name: Check changes
    uses: ./.github/workflows/check-changes.yaml

  golangci-lint:
    name: Golangci-lint
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ needs.check-changes.outputs.go == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.3

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.5.0

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ needs.check-changes.outputs.go == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.3

      - name: Run tests
        run: go test github.com/karelvanhecke/kubelet-serving-approver/...

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ needs.check-changes.outputs.go == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.3

      - name: Setup Kind
        env:
          KIND_VERSION: v0.30.0
        run: go install sigs.k8s.io/kind@${KIND_VERSION}

      - name: Setup kubectl
        env:
          KUBECTL_VERSION: v1.33.5
          KUBECTL_PATH: /usr/local/bin/kubectl
        run: |
          curl -s -L https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl | sudo tee $KUBECTL_PATH >/dev/null
          sha256sum $KUBECTL_PATH | grep -w $(curl -s -L https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256) >/dev/null
          sudo chmod +x $KUBECTL_PATH

      - name: Run integration tests
        run: tests/integration-tests.sh

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ needs.check-changes.outputs.deps == 'true' }}
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Review dependencies
        uses: actions/dependency-review-action@40c09b7dc99638e5ddb0bfd91c1673effc064d8a # v4.8.1
        with:
          comment-summary-in-pr: always
