name: Code scanning

on:
  schedule:
    - cron: '15 1 * * *'
  push:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'
      - '*.go'
      - '**/*.go'
  pull_request:
    branches:
      - main

jobs:
  check-changes:
    name: Check changes
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/check-changes.yaml

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ (!cancelled() && github.event_name != 'pull_request') || needs.check-changes.outputs.go == 'true' }}
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4

      - name: Init
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: autobuild

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    needs: ["check-changes"]
    if: ${{ (!cancelled() && github.event_name != 'pull_request') || needs.check-changes.outputs.go == 'true' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code (push|schedule)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          persist-credentials: false

      - name: Run scanner (push|schedule)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        if: ${{ github.event_name != 'pull_request' }}
        with:
          scan-args: |-
            --output=results.json
            --format=json
            -r
            ./
        continue-on-error: true

      - name: Run osv-scanner-reporter (push|schedule)
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        if: ${{ github.event_name != 'pull_request' }}
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=false

      - name: Checkout code (pull request)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ github.event_name == 'pull_request' }}
        with:
          fetch-depth: 0

      - name: Checkout target branch (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git checkout $GITHUB_BASE_REF
          git submodule update --recursive

      - name: Run scanner on existing code (pull request)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            -r
            ./

      - name: Checkout current branch (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git checkout -f $GITHUB_SHA
          git submodule update --recursive

      - name: Run scanner on new code (pull request)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        if: ${{ github.event_name == 'pull_request' }}
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            -r
            ./
        continue-on-error: true

      - name: Run osv-scanner-reporter (pull request)
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        if: ${{ github.event_name == 'pull_request' }}
        with:
          scan-args: |-
            --output=results.sarif
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=true

      - name: Upload to code-scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
